<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Initialize Firebase
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-custom-archive';

        // UI Elements
        const uploadSection = document.getElementById('upload-section');
        const viewSection = document.getElementById('view-section');
        const fileInput = document.getElementById('file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const statusMsg = document.getElementById('status-msg');
        const textContent = document.getElementById('text-content');
        const archiveSection = document.getElementById('archive-section');
        const archiveList = document.getElementById('archive-list');
        const shareLinkContainer = document.getElementById('share-link-container');
        const shareLink = document.getElementById('share-link');

        // Check if we are viewing a specific page via URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const pageToView = urlParams.get('page');

        // Auth handling
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error", error);
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) return;

            if (pageToView) {
                // View Mode
                uploadSection.classList.add('hidden');
                archiveSection.classList.add('hidden');
                viewSection.classList.remove('hidden');
                loadText(pageToView);
            } else {
                // Upload Mode
                uploadSection.classList.remove('hidden');
                archiveSection.classList.remove('hidden');
                viewSection.classList.add('hidden');
                loadArchive();
            }
        });

        // Load and display text
        async function loadText(filename) {
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'texts', filename);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    // Basic formatting: preserve line breaks
                    textContent.innerHTML = docSnap.data().content.replace(/\n/g, '<br>');
                } else {
                    textContent.innerHTML = "The philosophical text you are looking for does not exist in these archives.";
                }
            } catch (error) {
                textContent.innerHTML = "Error loading text.";
            }
        }

        // Load and display all texts in library
        async function loadArchive() {
            try {
                const querySnapshot = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'texts'));
                const texts = [];
                querySnapshot.forEach((doc) => {
                    texts.push({ id: doc.id, ...doc.data() });
                });
                
                // Sort by date descending in memory
                texts.sort((a, b) => new Date(b.uploadedAt || 0) - new Date(a.uploadedAt || 0));
                
                archiveList.innerHTML = texts.length === 0 
                    ? '<p class="text-slate-500 text-sm italic col-span-full text-center py-8">No texts published yet.</p>' 
                    : '';
                    
                texts.forEach(text => {
                    const date = new Date(text.uploadedAt).toLocaleDateString();
                    const title = text.id.replace(/-/g, ' ').toUpperCase();
                    const card = document.createElement('a');
                    card.href = `?page=${text.id}`;
                    card.className = "block p-6 bg-white border border-stone-200 rounded-2xl hover:shadow-md hover:border-stone-300 transition-all duration-300 group";
                    card.innerHTML = `
                        <h3 class="font-bold text-lg text-stone-900 group-hover:text-stone-600 transition truncate mb-2">${title}</h3>
                        <p class="text-xs text-stone-400 font-medium flex items-center gap-1.5">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            ${date}
                        </p>
                    `;
                    archiveList.appendChild(card);
                });
            } catch (error) {
                console.error("Error loading archive:", error);
                archiveList.innerHTML = '<p class="text-red-500 text-sm col-span-full">Failed to load library.</p>';
            }
        }

        // Handle Upload
        uploadBtn.addEventListener('click', async () => {
            const file = fileInput.files[0];
            if (!file) {
                statusMsg.textContent = "Please select a .txt file first.";
                return;
            }

            const reader = new FileReader();
            reader.onload = async (e) => {
                const content = e.target.result;
                // Create a URL-safe filename
                let safeName = file.name.toLowerCase().replace(/[^a-z0-9.]/g, '-');
                
                try {
                    statusMsg.textContent = "Publishing...";
                    statusMsg.className = "mt-4 text-blue-600";
                    
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'texts', safeName);
                    await setDoc(docRef, {
                        content: content,
                        uploadedAt: new Date().toISOString()
                    });

                    statusMsg.textContent = "Success! Your text is live.";
                    statusMsg.className = "mt-4 text-green-600 font-medium";
                    
                    // Generate share link
                    const currentUrl = new URL(window.location.href);
                    currentUrl.searchParams.set('page', safeName);
                    
                    shareLinkContainer.classList.remove('hidden');
                    shareLink.value = currentUrl.toString();

                } catch (error) {
                    statusMsg.textContent = "Error saving file.";
                    statusMsg.className = "mt-4 text-red-600";
                    console.error(error);
                }
            };
            reader.readAsText(file);
        });

        // Copy link functionality
        document.getElementById('copy-btn').addEventListener('click', () => {
            shareLink.select();
            document.execCommand('copy');
            const btn = document.getElementById('copy-btn');
            const originalText = btn.textContent;
            btn.textContent = "Copied!";
            setTimeout(() => btn.textContent = originalText, 2000);
        });

        initAuth();
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .zenith-theme { font-family: 'Merriweather', serif; }
    </style>
</head>
<body class="bg-stone-50 min-h-screen text-stone-800 selection:bg-stone-200 font-sans">

    <main class="max-w-5xl mx-auto p-6 md:p-12 mt-4 mb-20">
        
        <!-- UPLOAD SECTION (Visible when no page is specified in URL) -->
        <div id="upload-section" class="hidden mb-16">
            <div class="max-w-2xl mx-auto bg-white p-10 rounded-2xl shadow-sm border border-stone-200 text-center">
                <div class="w-16 h-16 bg-stone-100 rounded-full flex items-center justify-center mx-auto mb-6 text-stone-500">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"></path></svg>
                </div>
                <h1 class="text-3xl font-bold mb-3 tracking-tight text-stone-900">Publish a Text</h1>
                <p class="text-stone-500 mb-8">Upload a plain .txt file to generate a clean, shareable reading page.</p>
                
                <div class="flex flex-col items-center justify-center">
                    <input type="file" id="file-input" accept=".txt" class="block w-full max-w-sm text-sm text-stone-500
                        file:mr-4 file:py-3 file:px-6
                        file:rounded-full file:border-0
                        file:text-sm file:font-medium
                        file:bg-stone-900 file:text-white
                        hover:file:bg-stone-800 mb-6 cursor-pointer transition-all"
                    />
                    
                    <button id="upload-btn" class="w-full max-w-sm bg-stone-100 text-stone-800 font-medium py-3 px-6 rounded-full hover:bg-stone-200 transition-colors">
                        Upload & Publish
                    </button>
                </div>
                
                <div id="status-msg" class="mt-4 text-sm text-center"></div>

                <div id="share-link-container" class="hidden mt-8 pt-8 border-t border-stone-100 text-left max-w-sm mx-auto">
                    <label class="block text-xs font-semibold text-stone-400 uppercase tracking-wider mb-3">Your Live URL</label>
                    <div class="flex gap-2">
                        <input type="text" id="share-link" readonly class="flex-1 bg-stone-50 border border-stone-200 rounded-lg p-3 text-sm text-stone-600 outline-none focus:border-stone-400 transition">
                        <button id="copy-btn" class="bg-stone-900 hover:bg-stone-800 text-white px-5 py-3 rounded-lg text-sm font-medium transition">Copy</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ARCHIVE SECTION -->
        <div id="archive-section" class="hidden max-w-5xl mx-auto">
            <div class="flex items-center justify-between mb-8 border-b border-stone-200 pb-4">
                <h2 class="text-2xl font-bold text-stone-900 tracking-tight">Library</h2>
                <span class="text-sm text-stone-500 font-medium">Public Archive</span>
            </div>
            <div id="archive-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Archive items injected here -->
            </div>
        </div>

        <!-- VIEW SECTION (Visible when a text is loaded) -->
        <div id="view-section" class="hidden bg-white p-12 md:p-24 rounded-3xl shadow-sm border border-stone-200 relative mt-8">
            <a href="?" class="inline-flex items-center gap-2 text-sm font-medium text-stone-400 hover:text-stone-800 transition mb-16 group">
                <span class="group-hover:-translate-x-1 transition-transform">&larr;</span> Back to Library
            </a>
            
            <div id="text-content" class="zenith-theme text-lg md:text-xl text-stone-800 leading-relaxed max-w-2xl mx-auto relative z-10">
                <!-- Text injected here -->
            </div>
        </div>

    </main>

</body>
</html>
